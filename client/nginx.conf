server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend if needed, 
    # but since the client handles the URL via API_URL, 
    # we don't strictly need a proxy here unless we want to avoid CORS.
}
